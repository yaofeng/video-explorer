# docker-compose.local.yaml
# 本地测试用：用本地目录替代 CIFS 挂载
services:
  video-explorer:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8002:8000"
    volumes:
      - ./data:/app/data
      - ./test-videos:/videos:ro
    environment:
      - DATA_PATH=/app/data
      - IP_WHITE_LIST=${IP_WHITE_LIST:-}
      # Docker 端口映射时，客户端 IP 会被 docker 网关 IP 替换。
      # 设为 "*" 信任所有代理（仅限内部网络环境使用）。
      - FORWARDED_ALLOW_IPS=*
