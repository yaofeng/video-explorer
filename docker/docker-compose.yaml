services:
  video-explorer:
    image: yaofeng928/video-explorer:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile
      tags:
        - yaofeng928/video-explorer:latest
    ports:
      - "8002:8000"
    volumes:
      - ${DATA_PATH:-./data}:/app/data
      - fnos-video:/videos:ro
    environment:
      - DATA_PATH=/app/data
      - IP_WHITE_LIST=${IP_WHITE_LIST:-}
      # 反向代理真实 IP 解析。Nginx/Caddy/Tailscale Funnel 等代理场景需设为
      # 代理 IP 或 "*"（仅限内部可信网络）。直连访问时无需设置。
      - FORWARDED_ALLOW_IPS=${FORWARDED_ALLOW_IPS:-127.0.0.1}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  fnos-video:
    driver: local
    driver_opts:
      type: cifs
      device: //${SMB_SERVER}/${SMB_SHARE}
      o: username=${SMB_USERNAME},password=${SMB_PASSWORD},iocharset=utf8,file_mode=0444,dir_mode=0555