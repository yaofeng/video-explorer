services:
  video-explorer:
    image: yaofeng928/video-explorer:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8002:8000"
    volumes:
      - ${DATA_PATH:-./data}:/app/data
      - fnos-video:/videos:ro
    environment:
      - DATA_PATH=/app/data
      - IP_WHITE_LIST=${IP_WHITE_LIST:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  fnos-video:
    driver: local
    driver_opts:
      type: cifs
      device: //${SMB_SERVER}/${SMB_SHARE}
      o: username=${SMB_USERNAME},password=${SMB_PASSWORD},iocharset=utf8,file_mode=0444,dir_mode=0555